// filter.js — Injected into PyVis HTML by the Domain Ontology Viewer notebook
// ════════════════════════════════════════════════════════════════════════════
//
// Section 1: Null-safe getElementById shim  (runs immediately)

// ── Section 1: Null-safe getElementById shim ─────────────────────────────
// PyVis's stabilization handlers call getElementById('bar'), ('text'),
// ('loadingBar'), ('border') which can return null in the Databricks
// displayHTML() iframe, causing:
//   "Cannot read properties of null (reading 'removeAttribute')"
// This shim returns a harmless dummy <div> for those IDs instead of null.
// ─────────────────────────────────────────────────────────────────────────

(function() {
    var _orig = document.getElementById.bind(document);
    var _safeIds = { loadingBar: 1, bar: 1, text: 1, border: 1 };
    var _dummy  = document.createElement('div');
    _dummy.style.cssText = 'display:none;width:0;height:0;opacity:0;';
    _dummy.innerHTML = '0%';
    document.getElementById = function(id) {
        return _orig(id) || (id in _safeIds ? _dummy : null);
    };
})();
</script>

                  var options = {"configure": {"enabled": false}, "edges": {"color": {"inherit": true}, "smooth": {"enabled": true, "type": "dynamic"}}, "interaction": {"dragNodes": true, "hideEdgesOnDrag": false, "hideNodesOnDrag": false}, "physics": {"barnesHut": {"avoidOverlap": 0, "centralGravity": 0.35, "damping": 0.09, "gravitationalConstant": -8000, "springConstant": 0.04, "springLength": 180}, "enabled": true, "stabilization": {"enabled": true, "fit": true, "iterations": 1000, "onlyDynamicEdges": false, "updateInterval": 50}}, "groups": {"ADME": {"color": {"background": "#00CED1", "border": "#00CED1", "highlight": {"background": "#00CED1", "border": "#00CED1"}, "hover": {"background": "#00CED1", "border": "#00CED1"}}, "font": {"color": "white"}, "icon": {"color": "#00CED1"}}, "APPL": {"color": {"background": "#E6E600", "border": "#E6E600", "highlight": {"background": "#E6E600", "border": "#E6E600"}, "hover": {"background": "#E6E600", "border": "#E6E600"}}, "font": {"color": "white"}, "icon": {"color": "#E6E600"}}, "APPROVED": {"color": {"background": "#00FF00", "border": "#00FF00", "highlight": {"background": "#00FF00", "border": "#00FF00"}, "hover": {"background": "#00FF00", "border": "#00FF00"}}, "font": {"color": "white"}, "icon": {"color": "#00FF00"}}, "COMP": {"color": {"background": "#708090", "border": "#708090", "highlight": {"background": "#708090", "border": "#708090"}, "hover": {"background": "#708090", "border": "#708090"}}, "font": {"color": "white"}, "icon": {"color": "#708090"}}, "DISEASE": {"color": {"background": "#4682B4", "border": "#4682B4", "highlight": {"background": "#4682B4", "border": "#4682B4"}, "hover": {"background": "#4682B4", "border": "#4682B4"}}, "font": {"color": "white"}, "icon": {"color": "#4682B4"}}, "DetMethod": {"color": {"background": "#FF69B4", "border": "#FF69B4", "highlight": {"background": "#FF69B4", "border": "#FF69B4"}, "hover": {"background": "#FF69B4", "border": "#FF69B4"}}, "font": {"color": "white"}, "icon": {"color": "#FF69B4"}}, "HUB": {"color": {"background": "#FFD700", "border": "#FFD700", "highlight": {"background": "#FFD700", "border": "#FFD700"}, "hover": {"background": "#FFD700", "border": "#FFD700"}}, "font": {"color": "white"}, "icon": {"color": "#FFD700"}}, "LAB": {"color": {"background": "#228B22", "border": "#228B22", "highlight": {"background": "#228B22", "border": "#228B22"}, "hover": {"background": "#228B22", "border": "#228B22"}}, "font": {"color": "white"}, "icon": {"color": "#228B22"}}, "MODALITY": {"color": {"background": "#9370DB", "border": "#9370DB", "highlight": {"background": "#9370DB", "border": "#9370DB"}, "hover": {"background": "#9370DB", "border": "#9370DB"}}, "font": {"color": "white"}, "icon": {"color": "#9370DB"}}, "ONTOLOGY": {"color": {"background": "#CD853F", "border": "#CD853F", "highlight": {"background": "#CD853F", "border": "#CD853F"}, "hover": {"background": "#CD853F", "border": "#CD853F"}}, "font": {"color": "white"}, "icon": {"color": "#CD853F"}}, "PIPELINE": {"color": {"background": "#FFCC00", "border": "#FFCC00", "highlight": {"background": "#FFCC00", "border": "#FFCC00"}, "hover": {"background": "#FFCC00", "border": "#FFCC00"}}, "font": {"color": "white"}, "icon": {"color": "#FFCC00"}}, "Readout": {"color": {"background": "#7B68EE", "border": "#7B68EE", "highlight": {"background": "#7B68EE", "border": "#7B68EE"}, "hover": {"background": "#7B68EE", "border": "#7B68EE"}}, "font": {"color": "white"}, "icon": {"color": "#7B68EE"}}, "STYPE": {"color": {"background": "#32CD32", "border": "#32CD32", "highlight": {"background": "#32CD32", "border": "#32CD32"}, "hover": {"background": "#32CD32", "border": "#32CD32"}}, "font": {"color": "white"}, "icon": {"color": "#32CD32"}}, "TARGET": {"color": {"background": "#008080", "border": "#008080", "highlight": {"background": "#008080", "border": "#008080"}, "hover": {"background": "#008080", "border": "#008080"}}, "font": {"color": "white"}, "icon": {"color": "#008080"}}, "TOX": {"color": {     <script>
// ── Section 2: Layer filter panel ────────────────────────────────────────
// Discovers layer groups from the vis.js node DataSet, builds checkbox
// rows with FontAwesome icon swatches, and toggles visibility by
// removing / re-adding nodes + edges then re-running physics.
// ─────────────────────────────────────────────────────────────────────────

(function() {
    function init() {
        if (typeof network === 'undefined' || typeof nodes === 'undefined'
            || typeof edges === 'undefined') {
            return setTimeout(init, 200);
        }

        // ── Master copies of all nodes and edges (immutable reference) ──
        var allNodes = nodes.get();
        var allEdges = edges.get();

        // ── Discover groups + pick representative icon/color per group ──
        var groups = {};
        allNodes.forEach(function(n) {
            var g = n.group || 'Unknown';
            if (!groups[g]) {
                groups[g] = {
                    count: 0,
                    color: (n.icon && n.icon.color) || (typeof n.color === 'string' ? n.color : null) || '#888',
                    iconCode: (n.icon && n.icon.code) ? n.icon.code : '',
                    iconFace: (n.icon && n.icon.face) ? n.icon.face : 'FA7Solid',
                    iconWeight: (n.icon && n.icon.weight) ? n.icon.weight : '900'
                };
            }
            groups[g].count++;
        });

        // Track visibility per group
        var visibleGroups = {};
        Object.keys(groups).forEach(function(g) { visibleGroups[g] = true; });

        // Sort: HUB first, then alphabetical
        var keys = Object.keys(groups).sort(function(a, b) {
            if (a === 'HUB') return -1;
            if (b === 'HUB') return  1;
            return a.localeCompare(b);
        });

        var container = document.getElementById('filterRows');
        if (!container) return;

        keys.forEach(function(g) {
            var info = groups[g];

            var row = document.createElement('div');
            row.style.cssText = 'display:flex;align-items:center;padding:3px 4px;'
                + 'border-radius:4px;cursor:pointer;transition:background 0.15s;';
            row.onmouseenter = function() { this.style.background = 'rgba(255,255,255,0.08)'; };
            row.onmouseleave = function() { this.style.background = 'none'; };

            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = true;
            cb.dataset.group = g;
            cb.style.cssText = 'margin:0 6px 0 0;cursor:pointer;accent-color:' + info.color + ';';
            cb.onchange = function() {
                visibleGroups[this.dataset.group] = this.checked;
                applyFilters();
            };

            // FontAwesome icon swatch instead of colored dot
            var swatch = document.createElement('span');
            swatch.style.cssText = 'display:inline-block;width:16px;text-align:center;'
                + 'margin-right:6px;flex-shrink:0;font-size:13px;'
                + 'font-family:"' + info.iconFace + '";font-weight:' + info.iconWeight + ';'
                + 'color:' + info.color + ';';
            swatch.textContent = info.iconCode || '\uf111';  // fallback: fa-circle

            var lbl = document.createElement('span');
            lbl.style.cssText = 'color:#eee;font-size:12px;';
            lbl.textContent = g + ' (' + info.count + ')';

            row.appendChild(cb);
            row.appendChild(swatch);
            row.appendChild(lbl);
            container.appendChild(row);

            row.onclick = function(e) {
                if (e.target !== cb) { cb.checked = !cb.checked; cb.onchange(); }
            };
        });

        // ── Apply filters: clear DataSets, re-add visible, re-layout ──
        function applyFilters() {
            var visibleIds = new Set();
            allNodes.forEach(function(n) {
                if (visibleGroups[n.group || 'Unknown']) visibleIds.add(n.id);
            });

            var filteredNodes = allNodes.filter(function(n) {
                return visibleIds.has(n.id);
            });
            var filteredEdges = allEdges.filter(function(e) {
                return visibleIds.has(e.from) && visibleIds.has(e.to);
            });

            // Clear and rebuild DataSets — triggers physics re-layout
            nodes.clear();
            edges.clear();
            nodes.add(filteredNodes);
            edges.add(filteredEdges);

            // Re-run physics so remaining nodes settle into a clean layout
            network.stabilize(200);
        }

        // ── Button handlers ──
        document.getElementById('btnShowAll').onclick = function() {
            container.querySelectorAll('input[type=checkbox]').forEach(function(cb) {
                cb.checked = true;
                visibleGroups[cb.dataset.group] = true;
            });
            applyFilters();
        };
        document.getElementById('btnHideAll').onclick = function() {
            container.querySelectorAll('input[type=checkbox]').forEach(function(cb) {
                cb.checked = false;
                visibleGroups[cb.dataset.group] = false;
            });
            applyFilters();
        };
        document.getElementById('btnCenter').onclick = function() {
            network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
        };
    }

    init();
})();

// ── Font-ready redraw: force vis-network to repaint after webfont loads ──
(function() {
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function() {
            if (typeof network !== 'undefined') {
                network.redraw();
            }
        });
    }
})();

</script>
